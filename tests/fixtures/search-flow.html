<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Flow</title>
</head>
<body>
  <main>
    <h1>Search Portal</h1>
    <form id="search-form">
      <label for="search-box">Search</label>
      <input id="search-box" type="search" placeholder="Search articles">
      <button id="search-submit" type="submit">Search</button>
    </form>
    <div id="results" aria-live="polite"></div>
  </main>
  <script>
    document.getElementById('search-form').addEventListener('submit', function (event) {
      event.preventDefault();
      const query = document.getElementById('search-box').value || 'default';
      const results = document.getElementById('results');
      document.title = 'Search Results';
      results.replaceChildren();
      const message = document.createElement('p');
      message.textContent = 'Results for: ' + query;
      const link = document.createElement('a');
      link.className = 'result-link';
      link.href = 'article.html';
      link.textContent = 'Open article';
      results.append(message, link);
    });
  </script>
</body>
</html>
